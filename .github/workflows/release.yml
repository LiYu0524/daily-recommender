name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-13
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # ---- Python backend (PyInstaller) ----
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r requirements-web.txt
          pip install pyinstaller

      - name: Build Python backend with PyInstaller
        shell: bash
        run: |
          pyinstaller \
            --onefile \
            --name "ideer-backend-${{ matrix.target }}" \
            --add-data "profiles:profiles" \
            --add-data "email_utils:email_utils" \
            --add-data "fetchers:fetchers" \
            --add-data "sources:sources" \
            --add-data "llm:llm" \
            --add-data "cache_utils.py:." \
            --add-data "config.py:." \
            --add-data "base_source.py:." \
            --add-data "idea_generator.py:." \
            --add-data "report_generator.py:." \
            --hidden-import=uvicorn.logging \
            --hidden-import=uvicorn.loops \
            --hidden-import=uvicorn.loops.auto \
            --hidden-import=uvicorn.protocols \
            --hidden-import=uvicorn.protocols.http \
            --hidden-import=uvicorn.protocols.http.auto \
            --hidden-import=uvicorn.protocols.websockets \
            --hidden-import=uvicorn.protocols.websockets.auto \
            --hidden-import=uvicorn.lifespan \
            --hidden-import=uvicorn.lifespan.on \
            web_server.py

      - name: Place sidecar binary for Tauri
        shell: bash
        run: |
          mkdir -p client/src-tauri/binaries
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            cp "dist/ideer-backend-${{ matrix.target }}.exe" \
               "client/src-tauri/binaries/ideer-backend-${{ matrix.target }}.exe"
          else
            cp "dist/ideer-backend-${{ matrix.target }}" \
               "client/src-tauri/binaries/ideer-backend-${{ matrix.target }}"
            chmod +x "client/src-tauri/binaries/ideer-backend-${{ matrix.target }}"
          fi

      - name: Inject externalBin into tauri.conf.json
        shell: bash
        run: |
          cd client/src-tauri
          python -c "
          import json, sys
          with open('tauri.conf.json') as f:
              conf = json.load(f)
          conf['bundle']['externalBin'] = ['binaries/ideer-backend']
          with open('tauri.conf.json', 'w') as f:
              json.dump(conf, f, indent=2)
          print('Injected externalBin into tauri.conf.json')
          "

      # ---- Tauri desktop app ----
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ''
        with:
          projectPath: client
          tauriScript: npm run tauri
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: 'iDeer ${{ github.ref_name }}'
          releaseBody: |
            ## iDeer ${{ github.ref_name }}

            下载对应平台安装包，开箱即用，无需安装 Python 环境。

            | 平台 | 文件 |
            |------|------|
            | macOS (Apple Silicon) | `.dmg` aarch64 |
            | macOS (Intel) | `.dmg` x64 |
            | Windows | `.msi` / `.exe` |

            ### 首次运行
            - **macOS**: 如遇"无法打开"提示，右键点击应用 → 打开
            - **Windows**: 如遇 SmartScreen 提示，点击"仍要运行"
          releaseDraft: true
          prerelease: false
